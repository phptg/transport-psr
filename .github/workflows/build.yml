name: build

on:
  pull_request:
  push:
    branches: [ 'master' ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: PHP ${{ matrix.php }}-${{ matrix.os }}${{ matrix.prefer-lowest && '-lowest' || '' }}

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        php:
          - "8.2"
          - "8.3"
          - "8.4"
          - "8.5"
        prefer-lowest:
          - true
          - false

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install PHP with extensions
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        env:
          update: true
        with:
          php-version: ${{ matrix.php }}
          ini-values: date.timezone='UTC'
          coverage: xdebug

      - name: Install Composer dependencies
        uses: ramsey/composer-install@a8d0d959dab41457692a5e2041bd9b757a119e3f # 3.2.1
        with:
          composer-options: ${{ matrix.prefer-lowest && '--prefer-lowest' || '' }}

      - name: Run tests with PHPUnit
        run: vendor/bin/phpunit --colors=always --coverage-clover=coverage.xml

      - name: Upload coverage to Coveralls
        if: matrix.os == 'ubuntu-latest'
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2
        with:
          file: ./coverage.xml
